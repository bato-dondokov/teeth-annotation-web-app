<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% if title %}
      <title>{{ title }}</title>
    {% else %}
      <title>Разметка изображений</title>
    {% endif %}
    <link rel="stylesheet" href="../static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="frame">
        {% block content %}
        {% endblock %}
    </div>
    <div class="modal" id="statusModal">
        <div class="modal-content" id="statusModalContent">
            <div class="modal-icon" id="statusModalIcon"></div>
            <p id="statusModalMessage"></p>
            <button id="statusModalBtn">ОК</button>
        </div>
    </div>
    <!-- <script type="module" src="/static/js/utils.js"></script> -->
</body>
</html>
